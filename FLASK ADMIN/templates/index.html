<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Eye - Police Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon"></div>
                <h2>TRAFFIC EYE</h2>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active">Dashboard</a>
                <a href="#" class="nav-item">Violations</a>
                <a href="#" class="nav-item">Settings</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <h1>Violation Reports Dashboard</h1>
                <div class="user-profile">
                    <span>Officer Admin</span>
                    <div class="avatar"></div>
                </div>
            </header>

            <section class="metrics">
                <div class="metric-card">
                    <h3>Total Reports</h3>
                    <p id="total-reports">0</p>
                </div>
                <div class="metric-card warning">
                    <h3>Pending Review</h3>
                    <p id="pending-reports">0</p>
                </div>
                <div class="metric-card success">
                    <h3>Processed</h3>
                    <p id="processed-reports">0</p>
                </div>
            </section>

            <section class="data-section">
                <div class="table-container glass-panel">
                    <table id="reports-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Time</th>
                                <th>Plate Number</th>
                                <th>Violation</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="reports-body">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Image Modal -->
    <div id="image-modal" class="modal">
        <div class="modal-content glass-panel">
            <span class="close-btn">&times;</span>
            <h2>Evidence Images</h2>
            <div class="modal-body">
                <div class="carousel-container" style="position: relative; display: flex; align-items: center; justify-content: center; width: 100%;">
                    <button class="carousel-btn prev-btn" onclick="prevSlide()" style="position: absolute; left: 10px; background: rgba(0,0,0,0.5); border: none; color: white; padding: 12px; border-radius: 50%; font-size: 18px; cursor: pointer; z-index: 10;">&lt;</button>
                    <img id="modal-image" src="" alt="Violation Evidence" style="width: 100%; border-radius: 8px; border: 1px solid var(--border); max-height: 400px; object-fit: contain; background: #000;">
                    <button class="carousel-btn next-btn" onclick="nextSlide()" style="position: absolute; right: 10px; background: rgba(0,0,0,0.5); border: none; color: white; padding: 12px; border-radius: 50%; font-size: 18px; cursor: pointer; z-index: 10;">&gt;</button>
                </div>
                <div class="carousel-dots" id="carousel-dots" style="display: flex; justify-content: center; gap: 8px; margin-top: -8px; margin-bottom: 8px;"></div>
                <div class="modal-info">
                    <p><strong>Plate:</strong> <span id="modal-plate"></span></p>
                    <p><strong>Violation:</strong> <span id="modal-violation"></span></p>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
